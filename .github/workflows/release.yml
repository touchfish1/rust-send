name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "rust-send ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Downloads

            Pick the package that matches your platform:

            - Windows:
              - `rust-send_*_x64-setup.exe`: recommended installer for most users
              - `rust-send_*_x64_en-US.msi`: MSI package for managed or enterprise-style installation
            - macOS:
              - `rust-send_*_aarch64.dmg`: Apple Silicon Macs
              - `rust-send_aarch64.app.tar.gz`: app bundle archive
            - Linux:
              - `rust-send_*_amd64.deb`: Ubuntu / Debian
              - `rust-send-*-1.x86_64.rpm`: Fedora / RHEL / openSUSE
              - `rust-send_*_amd64.AppImage`: portable build for most modern Linux distributions

            ## Linux AppImage

            If you use the AppImage build, make it executable first:

            ```bash
            chmod +x rust-send_*.AppImage
            ./rust-send_*.AppImage
            ```

            ## In-app updates

            - `latest.json` is the updater metadata used by the desktop app.
            - `.sig` files are updater signatures used for integrity verification.

            ## Notes

            - Windows and macOS platform notarization / OS trust prompts may still appear until platform-specific signing is added.
            - If you are upgrading from an older desktop build, using the installer package is recommended.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
